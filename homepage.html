<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Home — Where Logic Meets Competition</title>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: rgba(14, 14, 24, 0.9);
      --surface2: rgba(20, 20, 36, 0.95);
      --purple: #7c3aed;
      --purple-mid: #6d28d9;
      --purple-light: #a78bfa;
      --purple-xlight: #c4b5fd;
      --purple-glow: rgba(124, 58, 237, 0.4);
      --border: rgba(124, 58, 237, 0.22);
      --border-hover: rgba(124, 58, 237, 0.5);
      --text: #e2e8f0;
      --text-dim: #94a3b8;
      --muted: #475569;
      --green: #10b981;
      --easy: #10b981;
      --medium: #f59e0b;
      --hard: #ef4444;
    }

    html, body {
      min-height: 100vh;
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow-x: hidden;
    }

    /* ── BACKGROUND ── */
    .bg-grid {
      position: fixed; inset: 0; z-index: 0;
      background-image:
        linear-gradient(rgba(124,58,237,0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(124,58,237,0.035) 1px, transparent 1px);
      background-size: 56px 56px;
      pointer-events: none;
    }

    .bg-glow {
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 80% 50% at 50% 0%, rgba(124,58,237,0.13) 0%, transparent 65%),
        radial-gradient(ellipse 40% 40% at 20% 80%, rgba(79,46,220,0.08) 0%, transparent 60%);
      pointer-events: none;
    }

    /* ── NAVBAR ── */
    nav {
      position: relative; z-index: 10;
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px 40px;
      border-bottom: 1px solid var(--border);
      background: rgba(10,10,15,0.7);
      backdrop-filter: blur(20px);
    }

    .nav-logo {
      display: flex; align-items: center; gap: 12px;
    }

    .logo-box {
      width: 38px; height: 38px;
      background: linear-gradient(135deg, var(--purple), #4f46e5);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Fira Code', monospace;
      font-size: 15px; font-weight: 700; color: #fff;
      box-shadow: 0 0 18px var(--purple-glow);
    }

    .nav-brand {
      font-family: 'Fira Code', monospace;
      font-size: 15px; font-weight: 600;
      color: var(--purple-light);
      letter-spacing: -0.3px;
    }

    .nav-right {
      display: flex; align-items: center; gap: 16px;
    }

    .nav-tag {
      font-family: 'Fira Code', monospace;
      font-size: 11px; color: var(--muted);
      background: rgba(124,58,237,0.08);
      border: 1px solid var(--border);
      padding: 4px 10px; border-radius: 20px;
    }

    .avatar {
      width: 34px; height: 34px;
      background: linear-gradient(135deg, var(--purple), #818cf8);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 600; color: #fff;
      cursor: pointer;
      border: 2px solid var(--border);
    }

    /* ── HERO ── */
    .hero {
      position: relative; z-index: 1;
      text-align: center;
      padding: 64px 24px 48px;
    }

    .hero-eyebrow {
      font-family: 'Fira Code', monospace;
      font-size: 11px; color: var(--purple-light);
      letter-spacing: 2px; text-transform: uppercase;
      margin-bottom: 16px;
      opacity: 0; animation: fadeUp 0.6s 0.1s ease forwards;
    }

    .hero h1 {
      font-family: 'Fira Code', monospace;
      font-size: clamp(28px, 5vw, 48px);
      font-weight: 700; line-height: 1.15;
      color: #f1f5f9;
      letter-spacing: -1px;
      margin-bottom: 14px;
      opacity: 0; animation: fadeUp 0.6s 0.2s ease forwards;
    }

    .hero h1 .accent { color: var(--purple-light); }

    .hero-sub {
      font-size: 15px; color: var(--text-dim);
      opacity: 0; animation: fadeUp 0.6s 0.3s ease forwards;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── MAIN CONTENT ── */
    .main {
      position: relative; z-index: 1;
      max-width: 560px; margin: 0 auto;
      padding: 0 24px 80px;
      display: flex; flex-direction: column; gap: 20px;
    }

    /* ── CARDS ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      backdrop-filter: blur(20px);
      overflow: hidden;
      box-shadow: 0 8px 40px rgba(0,0,0,0.4), 0 0 0 1px rgba(124,58,237,0.06);
      transition: border-color 0.3s ease, box-shadow 0.3s ease;
      opacity: 0; animation: fadeUp 0.6s ease forwards;
    }

    .card:nth-child(1) { animation-delay: 0.4s; }
    .card:nth-child(2) { animation-delay: 0.55s; }

    .card:hover {
      border-color: var(--border-hover);
      box-shadow: 0 8px 40px rgba(0,0,0,0.5), 0 0 30px rgba(124,58,237,0.12);
    }

    /* ── CARD HEADER (clickable) ── */
    .card-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 24px 28px;
      cursor: pointer;
      user-select: none;
    }

    .card-header-left {
      display: flex; align-items: center; gap: 16px;
    }

    .card-icon {
      width: 44px; height: 44px;
      background: linear-gradient(135deg, rgba(124,58,237,0.25), rgba(79,46,220,0.15));
      border: 1px solid rgba(124,58,237,0.3);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .card-title {
      font-family: 'Fira Code', monospace;
      font-size: 17px; font-weight: 600;
      color: #f1f5f9;
      letter-spacing: -0.3px;
    }

    .card-subtitle {
      font-size: 12px; color: var(--text-dim);
      margin-top: 2px;
    }

    .chevron {
      width: 28px; height: 28px;
      border: 1px solid var(--border);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      color: var(--purple-light);
      transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1), background 0.2s;
      flex-shrink: 0;
    }

    .chevron svg {
      transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
    }

    .card.open .chevron {
      background: rgba(124,58,237,0.15);
    }

    .card.open .chevron svg {
      transform: rotate(180deg);
    }

    /* ── EXPANDABLE BODY ── */
    .card-body {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.5s cubic-bezier(0.4,0,0.2,1);
    }

    .card.open .card-body {
      max-height: 600px;
    }

    .card-body-inner {
      padding: 0 28px 28px;
      border-top: 1px solid var(--border);
      padding-top: 24px;
    }

    /* ── FORM ELEMENTS ── */
    .field { margin-bottom: 22px; }
    .field:last-child { margin-bottom: 0; }

    .field-label {
      font-family: 'Fira Code', monospace;
      font-size: 11px; letter-spacing: 1.5px;
      color: var(--purple-light); text-transform: uppercase;
      margin-bottom: 10px;
      display: flex; align-items: center; gap: 8px;
    }

    .field-label .dot {
      width: 5px; height: 5px;
      background: var(--purple);
      border-radius: 50%;
    }

    /* ── DIFFICULTY PILLS ── */
    .diff-grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
    }

    .diff-pill {
      position: relative;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 10px;
      cursor: pointer;
      transition: all 0.2s ease;
      background: rgba(255,255,255,0.02);
      text-align: center;
    }

    .diff-pill:hover {
      background: rgba(124,58,237,0.08);
      border-color: var(--border-hover);
    }

    .diff-pill input[type="radio"] {
      position: absolute; opacity: 0; width: 0; height: 0;
    }

    .diff-pill.selected-easy   { border-color: var(--easy);   background: rgba(16,185,129,0.1); }
    .diff-pill.selected-medium { border-color: var(--medium); background: rgba(245,158,11,0.1); }
    .diff-pill.selected-hard   { border-color: var(--hard);   background: rgba(239,68,68,0.1); }

    .diff-name {
      font-family: 'Fira Code', monospace;
      font-size: 13px; font-weight: 600;
      margin-bottom: 6px;
    }

    .diff-pill:nth-child(1) .diff-name { color: var(--easy); }
    .diff-pill:nth-child(2) .diff-name { color: var(--medium); }
    .diff-pill:nth-child(3) .diff-name { color: var(--hard); }

    .diff-desc {
      font-size: 10px; color: var(--text-dim);
      line-height: 1.4;
    }

    /* ── DURATION INSIDE PILL ── */
    .diff-duration {
      margin-top: 7px;
      font-family: 'Fira Code', monospace;
      font-size: 10px;
      color: var(--muted);
      background: rgba(124,58,237,0.1);
      border: 1px solid rgba(124,58,237,0.2);
      border-radius: 5px;
      padding: 2px 6px;
      display: inline-block;
    }

    .selected-easy   .diff-duration { color: var(--easy);   background: rgba(16,185,129,0.1);  border-color: rgba(16,185,129,0.3); }
    .selected-medium .diff-duration { color: var(--medium); background: rgba(245,158,11,0.1);  border-color: rgba(245,158,11,0.3); }
    .selected-hard   .diff-duration { color: var(--hard);   background: rgba(239,68,68,0.1);   border-color: rgba(239,68,68,0.3); }

    /* ── WAITING TIME SLIDER ── */
    .wait-options {
      display: flex; gap: 8px;
    }

    .wait-btn {
      flex: 1;
      padding: 10px 4px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: rgba(255,255,255,0.02);
      color: var(--text-dim);
      font-family: 'Fira Code', monospace;
      font-size: 13px;
      cursor: pointer;
      text-align: center;
      transition: all 0.2s ease;
    }

    .wait-btn:hover {
      border-color: var(--border-hover);
      color: var(--text);
      background: rgba(124,58,237,0.08);
    }

    .wait-btn.active {
      border-color: var(--purple);
      background: rgba(124,58,237,0.2);
      color: var(--purple-xlight);
      font-weight: 600;
      box-shadow: 0 0 12px rgba(124,58,237,0.25);
    }

    .wait-label {
      font-size: 10px; display: block; margin-top: 3px; opacity: 0.7;
    }

    /* ── CREATE BUTTON ── */
    .btn-create {
      width: 100%; margin-top: 24px;
      padding: 14px;
      background: linear-gradient(135deg, var(--purple) 0%, #4f46e5 100%);
      border: none; border-radius: 12px;
      color: #fff;
      font-family: 'Fira Code', monospace;
      font-size: 14px; font-weight: 600;
      letter-spacing: 0.5px;
      cursor: pointer;
      position: relative; overflow: hidden;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      box-shadow: 0 4px 20px var(--purple-glow);
    }

    .btn-create::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.12), transparent 60%);
      pointer-events: none;
    }

    .btn-create:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px var(--purple-glow);
    }

    .btn-create:active { transform: translateY(0); }

    /* ── JOIN ROOM (static) ── */
    .join-inner {
      padding: 24px 28px;
    }

    .join-input-wrap {
      position: relative;
    }

    .join-input {
      width: 100%;
      padding: 14px 50px 14px 18px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-family: 'Fira Code', monospace;
      font-size: 15px;
      letter-spacing: 2px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .join-input::placeholder {
      color: var(--muted);
      letter-spacing: 0.5px;
      font-size: 13px;
    }

    .join-input:focus {
      border-color: var(--purple);
      box-shadow: 0 0 0 3px rgba(124,58,237,0.15);
    }

    .join-arrow {
      position: absolute; right: 14px; top: 50%;
      transform: translateY(-50%);
      width: 30px; height: 30px;
      background: linear-gradient(135deg, var(--purple), #4f46e5);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s;
      box-shadow: 0 2px 10px var(--purple-glow);
    }

    .join-arrow:hover {
      transform: translateY(-50%) scale(1.08);
      box-shadow: 0 4px 18px var(--purple-glow);
    }

    .join-arrow svg { color: #fff; }

    .join-hint {
      margin-top: 10px;
      font-size: 11px; color: var(--muted);
      font-family: 'Fira Code', monospace;
      text-align: center;
    }
  </style>
</head>
<body>

  <div class="bg-grid"></div>
  <div class="bg-glow"></div>

  <!-- NAV -->
  <nav>
    <div class="nav-logo">
      <div class="logo-box">&lt;/&gt;</div>
    </div>
    <div class="nav-right">
      <div class="avatar">U</div>
    </div>
  </nav>

  <!-- HERO -->
  <div class="hero">
    <h1>Ready to <span class="accent">compete</span>?</h1>
    <p class="hero-sub">Create a room or join one. May the best coder win.</p>
  </div>

  <!-- MAIN -->
  <div class="main">

    <!-- CREATE ROOM CARD -->
    <div class="card" id="createCard">
      <div class="card-header" onclick="toggleCard('createCard')">
        <div class="card-header-left">
          <div class="card-icon">⚡</div>
          <div>
            <div class="card-title">Create Room</div>
            <div class="card-subtitle">Set difficulty &amp; start a match</div>
          </div>
        </div>
        <div class="chevron">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="6 9 12 15 18 9"/>
          </svg>
        </div>
      </div>

      <div class="card-body">
        <div class="card-body-inner">

          <!-- Difficulty -->
          <div class="field">
            <div class="field-label"><span class="dot"></span>Difficulty</div>
            <div class="diff-grid">
              <label class="diff-pill" id="pill-easy">
                <input type="radio" name="difficulty" value="easy" onchange="updateDifficulty('easy')"/>
                <div class="diff-name">Easy</div>
                <div class="diff-desc">2 Easy<br/>1 Medium</div>
                <div class="diff-duration">⏱ 60 min</div>
              </label>
              <label class="diff-pill" id="pill-medium">
                <input type="radio" name="difficulty" value="medium" onchange="updateDifficulty('medium')"/>
                <div class="diff-name">Medium</div>
                <div class="diff-desc">1 Easy<br/>2 Medium</div>
                <div class="diff-duration">⏱ 90 min</div>
              </label>
              <label class="diff-pill" id="pill-hard">
                <input type="radio" name="difficulty" value="hard" onchange="updateDifficulty('hard')"/>
                <div class="diff-name">Hard</div>
                <div class="diff-desc">1 Easy · 2 Medium<br/>1 Hard</div>
                <div class="diff-duration">⏱ 120 min</div>
              </label>
            </div>
          </div>

          <!-- Waiting Time -->
          <div class="field">
            <div class="field-label"><span class="dot"></span>Waiting Time</div>
            <div class="wait-options" id="waitOptions">
              <button class="wait-btn" onclick="selectWait(this, 1)">1<span class="wait-label">min</span></button>
              <button class="wait-btn" onclick="selectWait(this, 2)">2<span class="wait-label">min</span></button>
              <button class="wait-btn" onclick="selectWait(this, 3)">3<span class="wait-label">min</span></button>
              <button class="wait-btn" onclick="selectWait(this, 4)">4<span class="wait-label">min</span></button>
              <button class="wait-btn" onclick="selectWait(this, 5)">5<span class="wait-label">min</span></button>
            </div>
          </div>

          <button class="btn-create" id="createBtn" onclick="createRoom(this)">
            ⚡ &nbsp;Create Room
          </button>

        </div>
      </div>
    </div>

    <!-- JOIN ROOM CARD -->
    <div class="card" id="joinCard">
      <div class="join-inner">
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px;">
          <div class="card-icon" style="width:36px;height:36px;font-size:16px;flex-shrink:0;">🔗</div>
          <div>
            <div class="card-title">Join Room</div>
            <div class="card-subtitle">Enter a code to jump in</div>
          </div>
        </div>
        <div class="join-input-wrap">
          <input class="join-input" id="roomCode" type="text" maxlength="6" placeholder="Enter room code" autocomplete="off" oninput="this.value = this.value.toUpperCase()"/>
          <div class="join-arrow" id="joinArrow" onclick="joinRoom()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>
            </svg>
          </div>
        </div>
        <div class="join-hint" id="joinHint"></div>
      </div>
    </div>

  </div><!-- /main -->

  <script>
    /* ── Toggle expand ── */
    function toggleCard(id) {
      document.getElementById(id).classList.toggle('open');
    }

    /* ── Difficulty ── */
    const durationMap = {
      easy:   { label: '60 min  ·  2 Easy + 1 Medium', cls: 'selected-easy' },
      medium: { label: '90 min  ·  1 Easy + 2 Medium', cls: 'selected-medium' },
      hard:   { label: '120 min  ·  1 Easy + 2 Medium + 1 Hard', cls: 'selected-hard' },
    };

    function updateDifficulty(val) {
      ['easy','medium','hard'].forEach(d => {
        const p = document.getElementById('pill-' + d);
        p.classList.remove('selected-easy','selected-medium','selected-hard');
      });
      document.getElementById('pill-' + val).classList.add(durationMap[val].cls);
    }

    /* ── Waiting time ── */
    function selectWait(btn, val) {
      document.querySelectorAll('.wait-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    }

    /* ── Create Room ── */
    async function createRoom(btn) {
      const diff = document.querySelector('input[name="difficulty"]:checked');
      const wait = document.querySelector('.wait-btn.active');
      if (!diff) { shake(btn, 'Select a difficulty'); return; }
      if (!wait) { shake(btn, 'Select waiting time'); return; }

      btn.disabled = true;
      btn.textContent = '⏳  Creating...';

      try {
        const response = await fetch('/createroom', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            difficulty: diff.value,
            waitingTime: parseInt(wait.textContent)
          })
        });

        if (response.ok) {
          const data = await response.json().catch(() => ({}));
          const code = data.code || Math.random().toString(36).substring(2,8).toUpperCase();
          btn.textContent = `✓  Room Created — Code: ${code}`;
          btn.style.background = 'linear-gradient(135deg, #059669, #047857)';
          btn.style.cursor = 'default';
        } else {
          throw new Error('Server error');
        }
      } catch (err) {
        shake(btn, 'Failed to create room');
        btn.disabled = false;
      }
    }

    function shake(el, msg) {
      el.textContent = `⚠  ${msg}`;
      el.style.background = 'linear-gradient(135deg,#7f1d1d,#991b1b)';
      el.animate([
        {transform:'translateX(-6px)'},{transform:'translateX(6px)'},
        {transform:'translateX(-4px)'},{transform:'translateX(4px)'},
        {transform:'translateX(0)'}
      ], {duration:300});
      setTimeout(() => {
        el.textContent = '⚡  Create Room';
        el.style.background = '';
      }, 1800);
    }

    /* ── Join Room ── */
    async function joinRoom() {
      const inp = document.getElementById('roomCode');
      const hint = document.getElementById('joinHint');
      const arrow = document.getElementById('joinArrow');
      const val = inp.value.trim();

      // Reset styles
      inp.style.borderColor = '';
      inp.style.boxShadow = '';
      hint.style.color = '';
      hint.textContent = '';

      if (val.length !== 6) {
        inp.style.borderColor = 'var(--hard)';
        inp.style.boxShadow = '0 0 0 3px rgba(239,68,68,0.15)';
        hint.style.color = 'var(--hard)';
        hint.textContent = '⚠  Room code must be exactly 6 characters.';
        inp.animate([
          {transform:'translateX(-6px)'},{transform:'translateX(6px)'},
          {transform:'translateX(-4px)'},{transform:'translateX(4px)'},
          {transform:'translateX(0)'}
        ], {duration:300});
        setTimeout(() => {
          inp.style.borderColor = '';
          inp.style.boxShadow = '';
          hint.textContent = '';
        }, 2500);
        return;
      }

      arrow.style.pointerEvents = 'none';
      arrow.style.opacity = '0.6';

      try {
        const response = await fetch('/joinroom', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ code: val })
        });

        if (response.ok) {
          arrow.style.background = 'linear-gradient(135deg,#059669,#047857)';
          arrow.style.opacity = '1';
          arrow.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>`;
          hint.style.color = 'var(--green)';
          hint.textContent = '✓  Joined successfully!';
        } else {
          throw new Error('Room not found');
        }
      } catch (err) {
        inp.style.borderColor = 'var(--hard)';
        inp.style.boxShadow = '0 0 0 3px rgba(239,68,68,0.15)';
        hint.style.color = 'var(--hard)';
        hint.textContent = '⚠  Room not found or unavailable.';
        arrow.style.pointerEvents = 'auto';
        arrow.style.opacity = '1';
        setTimeout(() => {
          inp.style.borderColor = '';
          inp.style.boxShadow = '';
          hint.textContent = '';
        }, 2500);
      }
    }
  </script>
</body>
</html>
