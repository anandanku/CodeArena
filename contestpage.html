<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contest — CodeArena</title>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500;600;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: rgba(14,14,24,0.95);
      --surface2: rgba(20,20,36,0.98);
      --surface3: rgba(26,26,46,0.95);
      --purple: #7c3aed;
      --purple-mid: #6d28d9;
      --purple-light: #a78bfa;
      --purple-xlight: #c4b5fd;
      --purple-glow: rgba(124,58,237,0.4);
      --purple-glow2: rgba(124,58,237,0.15);
      --border: rgba(124,58,237,0.2);
      --border-hover: rgba(124,58,237,0.5);
      --text: #e2e8f0;
      --text-dim: #94a3b8;
      --muted: #475569;
      --green: #10b981;
      --green-glow: rgba(16,185,129,0.3);
      --easy: #10b981;
      --medium: #f59e0b;
      --hard: #ef4444;
      --topbar-h: 52px;
    }

    html, body {
      height: 100%; overflow: hidden;
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    /* ── BG ── */
    .bg-grid {
      position: fixed; inset: 0; z-index: 0;
      background-image:
        linear-gradient(rgba(124,58,237,0.028) 1px, transparent 1px),
        linear-gradient(90deg, rgba(124,58,237,0.028) 1px, transparent 1px);
      background-size: 56px 56px;
      pointer-events: none;
    }
    .bg-glow {
      position: fixed; inset: 0; z-index: 0;
      background: radial-gradient(ellipse 70% 40% at 50% 0%, rgba(124,58,237,0.1) 0%, transparent 65%);
      pointer-events: none;
    }

    /* ── TOP BAR ── */
    .topbar {
      position: relative; z-index: 100;
      height: var(--topbar-h);
      display: flex; align-items: center;
      padding: 0 16px;
      background: rgba(10,10,15,0.92);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(24px);
      gap: 12px;
    }

    /* Left */
    .topbar-left {
      display: flex; align-items: center; gap: 10px;
      flex: 1;
    }

    .logo-box {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, var(--purple), #4f46e5);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Fira Code', monospace;
      font-size: 12px; font-weight: 700; color: #fff;
      box-shadow: 0 0 14px var(--purple-glow);
      flex-shrink: 0;
    }

    .contest-meta {
      display: flex; flex-direction: column;
    }

    .contest-name {
      font-family: 'Fira Code', monospace;
      font-size: 12px; font-weight: 600;
      color: var(--purple-light);
      line-height: 1;
    }

    .contest-timer {
      font-family: 'Fira Code', monospace;
      font-size: 11px; color: var(--text-dim);
      margin-top: 2px;
    }

    .timer-val { color: var(--purple-xlight); font-weight: 600; }

    /* Center */
    .topbar-center {
      display: flex; align-items: center; gap: 10px;
      position: absolute; left: 50%; transform: translateX(-50%);
    }

    .lang-select {
      background: rgba(124,58,237,0.1);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-dim);
      font-family: 'Fira Code', monospace;
      font-size: 12px;
      padding: 5px 10px;
      cursor: pointer;
      outline: none;
      transition: border-color 0.2s;
    }
    .lang-select:hover, .lang-select:focus { border-color: var(--purple-light); color: var(--text); }
    .lang-select option { background: #1a1a2e; }

    .btn-run {
      display: flex; align-items: center; gap: 7px;
      padding: 7px 20px;
      background: linear-gradient(135deg, var(--green) 0%, #059669 100%);
      border: none; border-radius: 9px;
      color: #fff;
      font-family: 'Fira Code', monospace;
      font-size: 13px; font-weight: 600;
      cursor: pointer;
      box-shadow: 0 0 16px var(--green-glow);
      transition: transform 0.15s, box-shadow 0.15s;
      position: relative; overflow: hidden;
    }
    .btn-run::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent 60%);
      pointer-events: none;
    }
    .btn-run:hover { transform: translateY(-1px); box-shadow: 0 4px 24px var(--green-glow); }
    .btn-run:active { transform: translateY(0); }
    .btn-run .shortcut {
      font-size: 10px; opacity: 0.65;
      background: rgba(0,0,0,0.2);
      border-radius: 4px; padding: 1px 5px;
    }

    /* Right */
    .topbar-right {
      display: flex; align-items: center; gap: 10px;
      flex: 1; justify-content: flex-end;
    }

    /* Room code */
    .room-code-wrap {
      display: flex; align-items: center; gap: 6px;
      background: rgba(124,58,237,0.1);
      border: 1px solid var(--border);
      border-radius: 9px;
      padding: 5px 10px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      position: relative;
    }
    .room-code-wrap:hover { border-color: var(--purple-light); background: rgba(124,58,237,0.18); }
    .room-code-label {
      font-family: 'Fira Code', monospace;
      font-size: 10px; color: var(--muted);
      text-transform: uppercase; letter-spacing: 1px;
    }
    .room-code-val {
      font-family: 'Fira Code', monospace;
      font-size: 13px; font-weight: 700;
      color: var(--purple-xlight);
      letter-spacing: 2px;
    }
    .copy-icon { color: var(--muted); transition: color 0.2s; flex-shrink: 0; }
    .room-code-wrap:hover .copy-icon { color: var(--purple-light); }
    .copy-toast {
      position: absolute; bottom: -30px; left: 50%; transform: translateX(-50%);
      background: rgba(16,185,129,0.9);
      color: #fff; font-family: 'Fira Code', monospace; font-size: 10px;
      padding: 3px 10px; border-radius: 5px;
      white-space: nowrap; pointer-events: none;
      opacity: 0; transition: opacity 0.2s;
    }
    .copy-toast.show { opacity: 1; }

    /* Leaderboard toggle btn */
    .lb-toggle-btn {
      display: flex; align-items: center; gap: 6px;
      padding: 6px 12px;
      background: rgba(124,58,237,0.1);
      border: 1px solid var(--border);
      border-radius: 9px;
      color: var(--text-dim);
      font-family: 'Fira Code', monospace;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
      user-select: none;
    }
    .lb-toggle-btn:hover, .lb-toggle-btn.active {
      border-color: var(--purple-light);
      background: rgba(124,58,237,0.2);
      color: var(--purple-xlight);
    }
    .lb-shortcut {
      font-size: 10px; opacity: 0.55;
      background: rgba(255,255,255,0.06);
      border-radius: 4px; padding: 1px 5px;
    }

    /* ── LEADERBOARD DROPDOWN ── */
    .lb-dropdown {
      position: absolute;
      top: calc(var(--topbar-h) + 8px);
      right: 16px;
      width: 320px;
      max-height: 0;
      overflow: hidden;
      z-index: 200;
      transition: max-height 0.4s cubic-bezier(0.4,0,0.2,1), opacity 0.3s ease;
      opacity: 0;
      border-radius: 16px;
    }
    .lb-dropdown.open {
      max-height: 420px;
      opacity: 1;
    }
    .lb-inner {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6), 0 0 0 1px rgba(124,58,237,0.08);
    }
    .lb-header {
      padding: 14px 18px 12px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .lb-title {
      font-family: 'Fira Code', monospace;
      font-size: 13px; font-weight: 600; color: var(--purple-light);
      display: flex; align-items: center; gap: 8px;
    }
    .lb-live-dot {
      width: 7px; height: 7px;
      background: var(--green);
      border-radius: 50%;
      box-shadow: 0 0 8px var(--green-glow);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.5; transform: scale(0.8); }
    }
    .lb-count {
      font-family: 'Fira Code', monospace;
      font-size: 10px; color: var(--muted);
    }
    .lb-list {
      max-height: 340px;
      overflow-y: auto;
      padding: 8px 0;
    }
    .lb-list::-webkit-scrollbar { width: 4px; }
    .lb-list::-webkit-scrollbar-track { background: transparent; }
    .lb-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .lb-item {
      display: flex; align-items: center; gap: 12px;
      padding: 9px 18px;
      transition: background 0.15s;
    }
    .lb-item:hover { background: rgba(124,58,237,0.06); }
    .lb-item.me { background: rgba(124,58,237,0.1); }
    .lb-rank {
      font-family: 'Fira Code', monospace;
      font-size: 12px; font-weight: 700;
      width: 22px; text-align: center; flex-shrink: 0;
    }
    .rank-1 { color: #fbbf24; }
    .rank-2 { color: #94a3b8; }
    .rank-3 { color: #cd7c45; }
    .rank-other { color: var(--muted); }
    .lb-avatar {
      width: 28px; height: 28px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 600; color: #fff;
      flex-shrink: 0;
    }
    .lb-user-info { flex: 1; min-width: 0; }
    .lb-username {
      font-family: 'Fira Code', monospace;
      font-size: 12px; font-weight: 500; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .lb-item.me .lb-username { color: var(--purple-xlight); }
    .lb-solved {
      font-size: 10px; color: var(--text-dim); margin-top: 1px;
    }
    .lb-score {
      font-family: 'Fira Code', monospace;
      font-size: 13px; font-weight: 700;
      color: var(--purple-light);
      flex-shrink: 0;
    }
    .lb-item.me .lb-score { color: var(--green); }

    /* ── SPLIT LAYOUT ── */
    .split-container {
      position: relative; z-index: 1;
      display: flex;
      height: calc(100vh - var(--topbar-h));
      overflow: hidden;
    }

    /* ── LEFT PANE — Problem ── */
    .pane-problem {
      display: flex; flex-direction: column;
      overflow: hidden;
      min-width: 280px;
      background: var(--surface);
      flex-shrink: 0;
    }

    .pane-problem-header {
      padding: 14px 20px 12px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 10px;
      flex-shrink: 0;
    }

    .problem-badge {
      font-family: 'Fira Code', monospace;
      font-size: 10px; font-weight: 600;
      padding: 3px 9px; border-radius: 20px;
      letter-spacing: 0.5px;
    }
    .badge-easy   { background: rgba(16,185,129,0.15); color: var(--easy); border: 1px solid rgba(16,185,129,0.3); }
    .badge-medium { background: rgba(245,158,11,0.15); color: var(--medium); border: 1px solid rgba(245,158,11,0.3); }
    .badge-hard   { background: rgba(239,68,68,0.15); color: var(--hard); border: 1px solid rgba(239,68,68,0.3); }

    .problem-num {
      font-family: 'Fira Code', monospace;
      font-size: 11px; color: var(--muted);
    }

    /* ── PROBLEM NAV BUTTONS ── */
    .problem-nav {
      display: flex; align-items: center; gap: 4px;
      margin-left: auto;
    }
    .nav-btn {
      width: 26px; height: 26px;
      display: flex; align-items: center; justify-content: center;
      background: rgba(124,58,237,0.08);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text-dim);
      cursor: pointer;
      transition: all 0.18s ease;
      flex-shrink: 0;
      user-select: none;
    }
    .nav-btn:hover:not(.disabled) {
      background: rgba(124,58,237,0.2);
      border-color: var(--purple-light);
      color: var(--purple-xlight);
    }
    .nav-btn.disabled { opacity: 0.28; cursor: not-allowed; }
    .problem-progress {
      font-family: 'Fira Code', monospace;
      font-size: 11px; color: var(--muted);
      padding: 0 4px;
      min-width: 36px; text-align: center;
    }

    .pane-problem-scroll {
      flex: 1; overflow-y: auto; padding: 20px;
    }
    .pane-problem-scroll::-webkit-scrollbar { width: 4px; }
    .pane-problem-scroll::-webkit-scrollbar-track { background: transparent; }
    .pane-problem-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .problem-title {
      font-family: 'Fira Code', monospace;
      font-size: 18px; font-weight: 700;
      color: #f1f5f9; margin-bottom: 14px;
      line-height: 1.3;
    }

    .problem-section-label {
      font-family: 'Fira Code', monospace;
      font-size: 10px; font-weight: 600;
      letter-spacing: 1.5px; text-transform: uppercase;
      color: var(--purple-light);
      margin: 20px 0 8px;
      display: flex; align-items: center; gap: 7px;
    }
    .problem-section-label::after {
      content: '';
      flex: 1; height: 1px;
      background: var(--border);
    }

    .problem-desc {
      font-size: 13.5px; color: var(--text-dim);
      line-height: 1.75;
    }
    .problem-desc code {
      font-family: 'Fira Code', monospace;
      font-size: 12px;
      background: rgba(124,58,237,0.15);
      border: 1px solid rgba(124,58,237,0.25);
      border-radius: 4px;
      padding: 1px 6px;
      color: var(--purple-xlight);
    }

    .example-block {
      background: rgba(124,58,237,0.05);
      border: 1px solid var(--border);
      border-left: 3px solid var(--purple);
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 10px;
    }
    .example-label {
      font-family: 'Fira Code', monospace;
      font-size: 10px; color: var(--purple-light);
      margin-bottom: 8px; letter-spacing: 0.5px;
    }
    .example-row {
      font-family: 'Fira Code', monospace;
      font-size: 12px; margin-bottom: 4px;
    }
    .example-key { color: var(--muted); }
    .example-val { color: var(--text); }
    .example-explain {
      font-size: 11.5px; color: var(--text-dim);
      margin-top: 8px; line-height: 1.5;
    }

    .constraints-list {
      list-style: none; padding: 0;
    }
    .constraints-list li {
      font-family: 'Fira Code', monospace;
      font-size: 12px; color: var(--text-dim);
      padding: 5px 0;
      border-bottom: 1px solid rgba(124,58,237,0.08);
      display: flex; align-items: center; gap: 8px;
    }
    .constraints-list li::before {
      content: '▸';
      color: var(--purple);
      font-size: 10px;
      flex-shrink: 0;
    }

    /* Loading skeleton */
    .skeleton {
      background: linear-gradient(90deg, rgba(124,58,237,0.08) 25%, rgba(124,58,237,0.15) 50%, rgba(124,58,237,0.08) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 6px;
      height: 14px; margin-bottom: 8px;
    }
    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* ── DIVIDER (draggable) ── */
    .divider {
      width: 5px;
      background: var(--border);
      cursor: col-resize;
      flex-shrink: 0;
      position: relative;
      transition: background 0.2s;
      z-index: 10;
    }
    .divider:hover, .divider.dragging {
      background: var(--purple);
    }
    .divider::after {
      content: '';
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 3px; height: 40px;
      background: rgba(167,139,250,0.4);
      border-radius: 3px;
    }
    .divider:hover::after, .divider.dragging::after {
      background: rgba(167,139,250,0.8);
    }

    /* ── RIGHT PANE — Editor ── */
    .pane-editor {
      flex: 1;
      display: flex; flex-direction: column;
      overflow: hidden;
      min-width: 280px;
      background: var(--surface2);
    }

    .editor-topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 14px;
      border-bottom: 1px solid var(--border);
      background: rgba(10,10,15,0.6);
      flex-shrink: 0;
    }

    .editor-tabs {
      display: flex; gap: 4px;
    }

    .editor-tab {
      font-family: 'Fira Code', monospace;
      font-size: 11px;
      padding: 4px 12px;
      border-radius: 6px;
      cursor: pointer;
      border: 1px solid transparent;
      color: var(--muted);
      transition: all 0.15s;
    }
    .editor-tab.active {
      background: rgba(124,58,237,0.18);
      border-color: var(--border);
      color: var(--purple-xlight);
    }
    .editor-tab:hover:not(.active) { color: var(--text-dim); background: rgba(255,255,255,0.03); }

    .editor-actions {
      display: flex; gap: 8px; align-items: center;
    }

    .btn-submit {
      padding: 5px 14px;
      background: linear-gradient(135deg, var(--purple), #4f46e5);
      border: none; border-radius: 7px;
      color: #fff;
      font-family: 'Fira Code', monospace;
      font-size: 12px; font-weight: 600;
      cursor: pointer;
      box-shadow: 0 0 12px var(--purple-glow);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .btn-submit:hover { transform: translateY(-1px); box-shadow: 0 4px 18px var(--purple-glow); }

    /* Code area */
    .code-editor-wrap {
      flex: 1; position: relative; overflow: hidden;
    }

    .line-numbers {
      position: absolute; left: 0; top: 0; bottom: 0;
      width: 44px;
      background: rgba(0,0,0,0.2);
      border-right: 1px solid var(--border);
      padding: 14px 0;
      overflow: hidden;
      pointer-events: none;
      z-index: 2;
    }

    .line-num {
      font-family: 'Fira Code', monospace;
      font-size: 12px; color: var(--muted);
      text-align: right;
      padding: 0 10px;
      line-height: 21px;
      user-select: none;
    }

    .code-textarea {
      position: absolute; inset: 0;
      padding: 14px 14px 14px 58px;
      background: transparent;
      border: none; outline: none; resize: none;
      color: var(--text);
      font-family: 'Fira Code', monospace;
      font-size: 13px; line-height: 21px;
      tab-size: 4;
      width: 100%; height: 100%;
      caret-color: var(--purple-light);
      spellcheck: false;
    }
    .code-textarea::selection { background: rgba(124,58,237,0.3); }

    /* Output pane */
    .output-pane {
      height: 0;
      border-top: 1px solid var(--border);
      background: rgba(8,8,14,0.9);
      overflow: hidden;
      transition: height 0.35s cubic-bezier(0.4,0,0.2,1);
      flex-shrink: 0;
    }
    .output-pane.open { height: 200px; }

    .output-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 16px;
      border-bottom: 1px solid var(--border);
    }
    .output-title {
      font-family: 'Fira Code', monospace;
      font-size: 11px; color: var(--purple-light);
      letter-spacing: 1px; text-transform: uppercase;
      display: flex; align-items: center; gap: 8px;
    }
    .output-status {
      font-size: 10px; font-family: 'Fira Code', monospace;
      padding: 2px 8px; border-radius: 5px;
    }
    .status-running { background: rgba(245,158,11,0.15); color: var(--medium); border: 1px solid rgba(245,158,11,0.3); }
    .status-accepted { background: rgba(16,185,129,0.15); color: var(--easy); border: 1px solid rgba(16,185,129,0.3); }
    .status-error { background: rgba(239,68,68,0.15); color: var(--hard); border: 1px solid rgba(239,68,68,0.3); }

    .output-close {
      cursor: pointer; color: var(--muted);
      font-size: 16px; line-height: 1;
      transition: color 0.15s;
    }
    .output-close:hover { color: var(--text); }

    .output-body {
      padding: 12px 16px;
      font-family: 'Fira Code', monospace;
      font-size: 12px;
      color: var(--text-dim);
      line-height: 1.6;
      height: calc(200px - 40px);
      overflow-y: auto;
    }
    .output-body::-webkit-scrollbar { width: 3px; }
    .output-body::-webkit-scrollbar-thumb { background: var(--border); }
    .out-pass { color: var(--easy); }
    .out-fail { color: var(--hard); }
    .out-info { color: var(--purple-light); }
  </style>
</head>
<body>

<div class="bg-grid"></div>
<div class="bg-glow"></div>

<!-- TOP BAR -->
<div class="topbar">
  <!-- Left -->
  <div class="topbar-left">
    <div class="logo-box">&lt;/&gt;</div>
    <div class="contest-meta">
      <div class="contest-name">CodeArena</div>
      <div class="contest-timer">Time left: <span class="timer-val" id="timerVal">01:23:45</span></div>
    </div>
  </div>

  <!-- Center -->
  <div class="topbar-center">
    <select class="lang-select" id="langSelect">
      <option value="cpp">C++17</option>
      <option value="java">Java 17</option>
      <option value="python">Python 3</option>
    </select>
    <button class="btn-run" id="runBtn" onclick="runCode()">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21"/></svg>
      Run
      <span class="shortcut">Ctrl+↵</span>
    </button>
  </div>

  <!-- Right -->
  <div class="topbar-right">
    <div class="room-code-wrap" onclick="copyRoomCode(this)" title="Copy room code">
      <span class="room-code-label">Room</span>
      <span class="room-code-val" id="roomCodeDisplay">X7K9PQ</span>
      <svg class="copy-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
      </svg>
      <div class="copy-toast" id="copyToast">Copied!</div>
    </div>
    <div class="lb-toggle-btn" id="lbToggleBtn" onclick="toggleLeaderboard()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/>
      </svg>
      Leaderboard
      <span class="lb-shortcut">Ctrl+L</span>
    </div>
  </div>
</div>

<!-- LEADERBOARD DROPDOWN -->
<div class="lb-dropdown" id="lbDropdown">
  <div class="lb-inner">
    <div class="lb-header">
      <div class="lb-title">
        <div class="lb-live-dot"></div>
        Live Rankings
      </div>
      <div class="lb-count" id="lbCount">8 participants</div>
    </div>
    <div class="lb-list" id="lbList">
      <!-- populated by JS -->
    </div>
  </div>
</div>

<!-- SPLIT CONTAINER -->
<div class="split-container" id="splitContainer">

  <!-- LEFT: Problem Description -->
  <div class="pane-problem" id="paneLeft" style="width:42%">
    <div class="pane-problem-header">
      <span class="problem-badge badge-medium" id="problemBadge">Medium</span>
      <span class="problem-num" id="problemNum">#1</span>
      <div class="problem-nav">
        <div class="nav-btn disabled" id="prevBtn" onclick="navigateProblem(-1)" title="Previous problem">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        </div>
        <span class="problem-progress" id="problemProgress">1 / 1</span>
        <div class="nav-btn disabled" id="nextBtn" onclick="navigateProblem(1)" title="Next problem">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
        </div>
      </div>
    </div>
    <div class="pane-problem-scroll" id="problemContent">
      <!-- Loading skeletons -->
      <div class="skeleton" style="width:60%;height:22px;margin-bottom:16px;"></div>
      <div class="skeleton" style="width:100%"></div>
      <div class="skeleton" style="width:95%"></div>
      <div class="skeleton" style="width:88%"></div>
      <div class="skeleton" style="width:75%;margin-bottom:20px"></div>
      <div class="skeleton" style="width:40%;height:12px;margin-bottom:12px"></div>
      <div class="skeleton" style="width:100%;height:80px"></div>
    </div>
  </div>

  <!-- DIVIDER -->
  <div class="divider" id="divider"></div>

  <!-- RIGHT: Code Editor -->
  <div class="pane-editor" id="paneRight">
    <div class="editor-topbar">
      <div class="editor-tabs">
        <div class="editor-tab active" onclick="switchTab(this,'code')">solution.py</div>
        <div class="editor-tab" onclick="switchTab(this,'testcase')">testcase</div>
      </div>
      <div class="editor-actions">
        <button class="btn-submit" onclick="submitCode()">Submit →</button>
      </div>
    </div>

    <div class="code-editor-wrap" id="codeWrap">
      <div class="line-numbers" id="lineNumbers">
        <div class="line-num">1</div>
      </div>
      <textarea class="code-textarea" id="codeEditor" spellcheck="false" autocorrect="off" autocapitalize="off"
        oninput="updateLineNumbers()" onscroll="syncScroll()"
        placeholder="# Write your solution here..."></textarea>
    </div>

    <!-- OUTPUT PANE -->
    <div class="output-pane" id="outputPane">
      <div class="output-header">
        <div class="output-title">
          Output
          <span class="output-status" id="outputStatus"></span>
        </div>
        <span class="output-close" onclick="closeOutput()">×</span>
      </div>
      <div class="output-body" id="outputBody"></div>
    </div>
  </div>

</div>

<script>
  /* ═══════════════════════════════════════════
     PROBLEM FETCHING (from Redis via backend)
  ═══════════════════════════════════════════ */
  const ROOM_CODE = new URLSearchParams(window.location.search).get('room') || 'X7K9PQ';
  document.getElementById('roomCodeDisplay').textContent = ROOM_CODE;

  // Multi-problem state
  let allProblems = [];
  let currentProblemIndex = 0;

  // Demo problems fallback
  const DEMO_PROBLEMS = [
    {
      number: 1,
      difficulty: 'easy',
      title: 'Two Sum',
      description: `Given an array of integers <code>nums</code> and an integer <code>target</code>, return <em>indices of the two numbers such that they add up to target</em>.\n\nYou may assume that each input would have <strong>exactly one solution</strong>, and you may not use the same element twice.\n\nYou can return the answer in any order.`,
      examples: [
        { input: 'nums = [2,7,11,15], target = 9', output: '[0,1]', explanation: 'Because nums[0] + nums[1] == 9, we return [0, 1].' },
        { input: 'nums = [3,2,4], target = 6', output: '[1,2]', explanation: '' },
        { input: 'nums = [3,3], target = 6', output: '[0,1]', explanation: '' }
      ],
      constraints: [
        '2 ≤ nums.length ≤ 10⁴',
        '-10⁹ ≤ nums[i] ≤ 10⁹',
        '-10⁹ ≤ target ≤ 10⁹',
        'Only one valid answer exists'
      ],
      snippets: {
        python: `class Solution:\n    def twoSum(self, nums: List[int], target: int) -> List[int]:\n        # Your code here\n        pass\n`,
        cpp: `class Solution {\npublic:\n    vector<int> twoSum(vector<int>& nums, int target) {\n        // Your code here\n    }\n};\n`,
        java: `class Solution {\n    public int[] twoSum(int[] nums, int target) {\n        // Your code here\n        return new int[]{};\n    }\n}\n`
      }
    },
    {
      number: 2,
      difficulty: 'medium',
      title: 'Two Sum II – Sorted Array',
      description: `Given a <code>1-indexed</code> array of integers <code>numbers</code> that is already sorted in non-decreasing order, find two numbers such that they add up to a specific <code>target</code> number.\n\nReturn the indices of the two numbers, <code>index1</code> and <code>index2</code>, added by one as an integer array <code>[index1, index2]</code> of length 2.\n\nThe tests are generated such that there is <strong>exactly one solution</strong>. You may not use the same element twice.`,
      examples: [
        { input: 'numbers = [2,7,11,15], target = 9', output: '[1,2]', explanation: 'The sum of 2 and 7 is 9. Therefore, index1 = 1, index2 = 2.' },
        { input: 'numbers = [2,3,4], target = 6', output: '[1,3]', explanation: 'The sum of 2 and 4 is 6.' },
        { input: 'numbers = [-1,0], target = -1', output: '[1,2]', explanation: 'The sum of -1 and 0 is -1.' }
      ],
      constraints: [
        '2 ≤ numbers.length ≤ 3 × 10⁴',
        '-1000 ≤ numbers[i] ≤ 1000',
        'numbers is sorted in non-decreasing order',
        '-1000 ≤ target ≤ 1000',
        'Exactly one solution exists'
      ],
      snippets: {
        python: `class Solution:\n    def twoSum(self, numbers: List[int], target: int) -> List[int]:\n        # Your code here\n        pass\n`,
        cpp: `class Solution {\npublic:\n    vector<int> twoSum(vector<int>& numbers, int target) {\n        // Your code here\n    }\n};\n`,
        java: `class Solution {\n    public int[] twoSum(int[] numbers, int target) {\n        // Your code here\n        return new int[]{};\n    }\n}\n`
      }
    },
    {
      number: 3,
      difficulty: 'hard',
      title: 'Trapping Rain Water',
      description: `Given <code>n</code> non-negative integers representing an elevation map where the width of each bar is <code>1</code>, compute how much water it can trap after raining.`,
      examples: [
        { input: 'height = [0,1,0,2,1,0,1,3,2,1,2,1]', output: '6', explanation: 'The above elevation map is represented by array [0,1,0,2,1,0,1,3,2,1,2,1]. In this case, 6 units of rain water are being trapped.' },
        { input: 'height = [4,2,0,3,2,5]', output: '9', explanation: '' }
      ],
      constraints: [
        'n == height.length',
        '1 ≤ n ≤ 2 × 10⁴',
        '0 ≤ height[i] ≤ 10⁵'
      ],
      snippets: {
        python: `class Solution:\n    def trap(self, height: List[int]) -> int:\n        # Your code here\n        pass\n`,
        cpp: `class Solution {\npublic:\n    int trap(vector<int>& height) {\n        // Your code here\n        return 0;\n    }\n};\n`,
        java: `class Solution {\n    public int trap(int[] height) {\n        // Your code here\n        return 0;\n    }\n}\n`
      }
    }
  ];

  async function fetchAllProblems() {
    try {
      const res = await fetch(`/problems?room=${ROOM_CODE}`);
      if (!res.ok) throw new Error('fetch failed');
      const data = await res.json();
      // Expects: { problems: [...], timeRemaining: <seconds> }
      allProblems = data.problems;
      if (typeof data.timeRemaining === 'number') {
        totalSecs = data.timeRemaining;
      }
    } catch(e) {
      allProblems = DEMO_PROBLEMS;
      // totalSecs keeps its default fallback value
    }
    currentProblemIndex = 0;
    renderProblem(allProblems[0]);
    updateNavButtons();
  }

  function navigateProblem(dir) {
    const next = currentProblemIndex + dir;
    if (next < 0 || next >= allProblems.length) return;
    currentProblemIndex = next;

    // Fade out → render → fade in
    const content = document.getElementById('problemContent');
    content.style.opacity = '0';
    content.style.transition = 'opacity 0.18s ease';
    setTimeout(() => {
      renderProblem(allProblems[currentProblemIndex]);
      content.style.opacity = '1';
    }, 180);

    updateNavButtons();
    // Reset editor for new problem
    document.getElementById('codeEditor').value = '';
    updateLineNumbers();
  }

  function updateNavButtons() {
    const prev = document.getElementById('prevBtn');
    const next = document.getElementById('nextBtn');
    const prog = document.getElementById('problemProgress');
    const total = allProblems.length;

    prev.classList.toggle('disabled', currentProblemIndex === 0);
    next.classList.toggle('disabled', currentProblemIndex === total - 1);
    prog.textContent = `${currentProblemIndex + 1} / ${total}`;
  }

  function renderProblem(data) {
    // Badge & number
    const badge = document.getElementById('problemBadge');
    badge.textContent = data.difficulty.charAt(0).toUpperCase() + data.difficulty.slice(1);
    badge.className = `problem-badge badge-${data.difficulty}`;
    document.getElementById('problemNum').textContent = `#${data.number}`;

    // Build HTML
    let html = `<div class="problem-title">${data.title}</div>`;

    html += `<div class="problem-section-label">Description</div>`;
    html += `<div class="problem-desc">${data.description.replace(/\n/g,'<br/>')}</div>`;

    html += `<div class="problem-section-label">Examples</div>`;
    data.examples.forEach((ex, i) => {
      html += `<div class="example-block">
        <div class="example-label">Example ${i+1}</div>
        <div class="example-row"><span class="example-key">Input: </span><span class="example-val">${ex.input}</span></div>
        <div class="example-row"><span class="example-key">Output: </span><span class="example-val">${ex.output}</span></div>
        ${ex.explanation ? `<div class="example-explain">${ex.explanation}</div>` : ''}
      </div>`;
    });

    html += `<div class="problem-section-label">Constraints</div>`;
    html += `<ul class="constraints-list">`;
    data.constraints.forEach(c => { html += `<li>${c}</li>`; });
    html += `</ul><div style="height:32px"></div>`;

    document.getElementById('problemContent').innerHTML = html;

    // Set editor snippet for current language
    const lang = document.getElementById('langSelect').value;
    const editor = document.getElementById('codeEditor');
    if (!editor.value && data.snippets) {
      editor.value = data.snippets[lang] || `// Solution for: ${data.title}\n`;
      updateLineNumbers();
    }
  }

  /* ═══════════════════════════════════════
     LEADERBOARD
  ═══════════════════════════════════════ */
  const MOCK_LEADERBOARD = [
    { name: 'you', score: 1480, solved: 2, avatar: '#7c3aed', me: true },
    { name: 'ninja_coder', score: 1920, solved: 3, avatar: '#0ea5e9' },
    { name: 'algomaster', score: 1750, solved: 3, avatar: '#f59e0b' },
    { name: 'bytewizard', score: 1650, solved: 2, avatar: '#10b981' },
    { name: 'recursion_fan', score: 1200, solved: 2, avatar: '#ec4899' },
    { name: 'dp_enjoyer', score: 980, solved: 1, avatar: '#06b6d4' },
    { name: 'stack_overflow', score: 850, solved: 1, avatar: '#8b5cf6' },
    { name: 'segfault_user', score: 200, solved: 0, avatar: '#64748b' },
  ];

  function renderLeaderboard() {
    // Sort by score desc
    const sorted = [...MOCK_LEADERBOARD].sort((a,b) => b.score - a.score);
    document.getElementById('lbCount').textContent = `${sorted.length} participants`;

    const list = document.getElementById('lbList');
    list.innerHTML = sorted.map((p, i) => {
      const rank = i + 1;
      const rankCls = rank === 1 ? 'rank-1' : rank === 2 ? 'rank-2' : rank === 3 ? 'rank-3' : 'rank-other';
      const rankStr = rank <= 3 ? ['🥇','🥈','🥉'][rank-1] : rank;
      return `<div class="lb-item ${p.me ? 'me' : ''}">
        <div class="lb-rank ${rankCls}">${rankStr}</div>
        <div class="lb-avatar" style="background:${p.avatar}">${p.name[0].toUpperCase()}</div>
        <div class="lb-user-info">
          <div class="lb-username">${p.me ? p.name + ' (you)' : p.name}</div>
          <div class="lb-solved">${p.solved} solved</div>
        </div>
        <div class="lb-score">${p.score}</div>
      </div>`;
    }).join('');
  }

  let lbOpen = false;
  function toggleLeaderboard() {
    lbOpen = !lbOpen;
    document.getElementById('lbDropdown').classList.toggle('open', lbOpen);
    document.getElementById('lbToggleBtn').classList.toggle('active', lbOpen);
  }

  /* ═══════════════════════════════════════
     COPY ROOM CODE
  ═══════════════════════════════════════ */
  function copyRoomCode(el) {
    const code = document.getElementById('roomCodeDisplay').textContent;
    navigator.clipboard.writeText(code).catch(() => {});
    const toast = document.getElementById('copyToast');
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 1600);
  }

  /* ═══════════════════════════════════════
     TIMER
  ═══════════════════════════════════════ */
  let totalSecs = 0; // set from backend via fetchAllProblems
  function tickTimer() {
    if (totalSecs <= 0) { document.getElementById('timerVal').textContent = '00:00:00'; return; }
    totalSecs--;
    const h = String(Math.floor(totalSecs / 3600)).padStart(2,'0');
    const m = String(Math.floor((totalSecs % 3600) / 60)).padStart(2,'0');
    const s = String(totalSecs % 60).padStart(2,'0');
    const el = document.getElementById('timerVal');
    el.textContent = `${h}:${m}:${s}`;
    if (totalSecs < 300) el.style.color = 'var(--hard)'; // red last 5 min
    else if (totalSecs < 900) el.style.color = 'var(--medium)'; // orange last 15 min
  }
  setInterval(tickTimer, 1000);

  /* ═══════════════════════════════════════
     CODE EDITOR — LINE NUMBERS
  ═══════════════════════════════════════ */
  function updateLineNumbers() {
    const ta = document.getElementById('codeEditor');
    const lines = ta.value.split('\n').length;
    const ln = document.getElementById('lineNumbers');
    let html = '';
    for (let i = 1; i <= lines; i++) html += `<div class="line-num">${i}</div>`;
    ln.innerHTML = html;
  }

  function syncScroll() {
    const ta = document.getElementById('codeEditor');
    const ln = document.getElementById('lineNumbers');
    ln.scrollTop = ta.scrollTop;
  }

  // Tab key inserts spaces
  document.getElementById('codeEditor').addEventListener('keydown', function(e) {
    if (e.key === 'Tab') {
      e.preventDefault();
      const start = this.selectionStart, end = this.selectionEnd;
      this.value = this.value.substring(0,start) + '    ' + this.value.substring(end);
      this.selectionStart = this.selectionEnd = start + 4;
      updateLineNumbers();
    }
  });

  // Language switch — update tab name & snippet
  document.getElementById('langSelect').addEventListener('change', function() {
    const ext = { cpp:'cpp', java:'java', python:'py' };
    document.querySelector('.editor-tab.active').textContent = `solution.${ext[this.value] || 'txt'}`;
  });

  /* ═══════════════════════════════════════
     TABS
  ═══════════════════════════════════════ */
  function switchTab(el, type) {
    document.querySelectorAll('.editor-tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    const ta = document.getElementById('codeEditor');
    if (type === 'testcase') {
      ta.value = `# Custom test case\n# Input:\nnumbers = [2, 7, 11, 15]\ntarget = 9\n\n# Expected Output:\n# [1, 2]\n`;
    } else {
      ta.value = '';
    }
    updateLineNumbers();
  }

  /* ═══════════════════════════════════════
     RUN CODE
  ═══════════════════════════════════════ */
  async function runCode() {
    const code = document.getElementById('codeEditor').value;
    const lang = document.getElementById('langSelect').value;
    const btn = document.getElementById('runBtn');

    // Open output pane
    const outputPane = document.getElementById('outputPane');
    outputPane.classList.add('open');

    const statusEl = document.getElementById('outputStatus');
    const bodyEl = document.getElementById('outputBody');

    statusEl.className = 'output-status status-running';
    statusEl.textContent = 'Running...';
    bodyEl.innerHTML = '<span class="out-info">⏳ Executing against test cases...</span>';

    btn.disabled = true;
    btn.style.opacity = '0.7';

    try {
      const res = await fetch('/run', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ code, language: lang, room: ROOM_CODE, problem: allProblems[currentProblemIndex]?.number })
      });
      if (res.ok) {
        const data = await res.json();
        renderOutput(data);
      } else {
        throw new Error('Server error');
      }
    } catch(e) {
      // Demo output
      renderOutput({
        status: 'accepted',
        passed: 3, total: 3,
        runtime: '52ms', memory: '17.2MB',
        results: [
          { test: 1, input: '[2,7,11,15], 9', expected: '[1,2]', got: '[1,2]', pass: true },
          { test: 2, input: '[2,3,4], 6', expected: '[1,3]', got: '[1,3]', pass: true },
          { test: 3, input: '[-1,0], -1', expected: '[1,2]', got: '[1,2]', pass: true },
        ]
      });
    }

    btn.disabled = false;
    btn.style.opacity = '1';
  }

  function renderOutput(data) {
    const statusEl = document.getElementById('outputStatus');
    const bodyEl = document.getElementById('outputBody');
    const allPass = data.passed === data.total;

    statusEl.className = `output-status ${allPass ? 'status-accepted' : 'status-error'}`;
    statusEl.textContent = allPass ? `✓ Accepted (${data.passed}/${data.total})` : `✗ Wrong Answer (${data.passed}/${data.total})`;

    let html = `<div style="margin-bottom:10px;color:var(--text-dim)">
      Runtime: <span style="color:var(--purple-xlight)">${data.runtime || '—'}</span> &nbsp;|&nbsp;
      Memory: <span style="color:var(--purple-xlight)">${data.memory || '—'}</span>
    </div>`;

    (data.results || []).forEach(r => {
      html += `<div style="margin-bottom:6px">
        <span class="${r.pass ? 'out-pass' : 'out-fail'}">${r.pass ? '✓' : '✗'} Test ${r.test}</span>
        <span style="color:var(--muted);font-size:11px;margin-left:8px">Input: ${r.input} → Expected: ${r.expected}${!r.pass ? ` · Got: <span class="out-fail">${r.got}</span>` : ''}</span>
      </div>`;
    });

    bodyEl.innerHTML = html;
  }

  function closeOutput() {
    document.getElementById('outputPane').classList.remove('open');
  }

  async function submitCode() {
    const code = document.getElementById('codeEditor').value;
    const lang = document.getElementById('langSelect').value;
    try {
      await fetch('/submit', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ code, language: lang, room: ROOM_CODE, problem: allProblems[currentProblemIndex]?.number })
      });
    } catch(e) {}
    // Trigger run view as well
    runCode();
  }

  /* ═══════════════════════════════════════
     DRAGGABLE DIVIDER
  ═══════════════════════════════════════ */
  const divider = document.getElementById('divider');
  const container = document.getElementById('splitContainer');
  const paneLeft = document.getElementById('paneLeft');
  const paneRight = document.getElementById('paneRight');

  let dragging = false, startX = 0, startW = 0;

  divider.addEventListener('mousedown', e => {
    dragging = true;
    startX = e.clientX;
    startW = paneLeft.offsetWidth;
    divider.classList.add('dragging');
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
  });

  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    const delta = e.clientX - startX;
    const containerW = container.offsetWidth;
    let newW = startW + delta;
    newW = Math.max(220, Math.min(containerW - 280, newW));
    paneLeft.style.width = newW + 'px';
  });

  document.addEventListener('mouseup', () => {
    if (!dragging) return;
    dragging = false;
    divider.classList.remove('dragging');
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
  });

  /* ═══════════════════════════════════════
     KEYBOARD SHORTCUTS
  ═══════════════════════════════════════ */
  document.addEventListener('keydown', e => {
    // Ctrl+Enter → Run
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
      e.preventDefault();
      runCode();
    }
    // Ctrl+L → Toggle Leaderboard
    if ((e.ctrlKey || e.metaKey) && e.key === 'l') {
      e.preventDefault();
      toggleLeaderboard();
    }
  });

  /* ═══════════════════════════════════════
     CLOSE LEADERBOARD ON OUTSIDE CLICK
  ═══════════════════════════════════════ */
  document.addEventListener('click', e => {
    if (!lbOpen) return;
    const lb = document.getElementById('lbDropdown');
    const btn = document.getElementById('lbToggleBtn');
    if (!lb.contains(e.target) && !btn.contains(e.target)) {
      lbOpen = false;
      lb.classList.remove('open');
      btn.classList.remove('active');
    }
  });

  /* ═══════════════════════════════════════
     INIT
  ═══════════════════════════════════════ */
  fetchAllProblems();
  renderLeaderboard();
  updateLineNumbers();
</script>
</body>
</html>
